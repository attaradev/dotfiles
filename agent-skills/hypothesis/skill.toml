name = "hypothesis"
title = "Hypothesis & Experiment Design"

[claude]
description = "This skill should be used when the user asks to \"write a hypothesis\", \"frame this as an experiment\", \"how do we validate this\", \"lean hypothesis for this\", \"experiment design\", \"build-measure-learn for this\", or \"what is our riskiest assumption\". Produces a lean experiment hypothesis with the assumption, signal, test design, and minimum evidence required to proceed."
argument_hint = "[the feature, idea, or belief you want to validate]"
argument_label = "Idea to validate"

[codex]
description = "Frame a feature or idea as a lean experiment hypothesis. Use when the user asks to write a hypothesis, identify the riskiest assumption, or design the cheapest test."

[codex.interface]
display_name = "Hypothesis Design"
short_description = "Frame a lean experiment"
default_prompt = "Use $hypothesis to define the riskiest assumption and cheapest test."
