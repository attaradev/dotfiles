name = "feature-flag"
title = "Feature Flag Design"

[claude]
description = "This skill should be used when the user asks to \"add a feature flag\", \"design a flag for this\", \"flag lifecycle\", \"clean up this flag\", \"feature toggle\", \"implement a feature gate\", \"rollout strategy with flags\", or \"remove this flag\". Designs feature flag implementation, evaluation logic, rollout strategy, and cleanup plan."
argument_hint = "[the feature to flag, or the flag to clean up]"
argument_label = "Feature / flag"

[codex]
description = "Design or clean up feature flags, rollout logic, targeting rules, cleanup plans, and test coverage when the user asks about flags or gated rollouts."

[codex.interface]
display_name = "Feature Flag"
short_description = "Design safe feature rollouts"
default_prompt = "Use $feature-flag to design the rollout and cleanup for this feature."
