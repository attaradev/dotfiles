name = "launch-plan"
title = "Go-to-Market Plan"

[claude]
description = "This skill should be used when the user asks to \"go-to-market plan\", \"launch strategy\", \"how do we roll this out\", \"GTM for this feature\", \"launch plan\", \"launch this feature\", or \"release strategy\". Produces a structured go-to-market brief covering audience, positioning, launch phases, channels, and success criteria."
argument_hint = "[feature, product, or release to plan a launch for]"
argument_label = "Launch"

[codex]
description = "Create a go-to-market brief for a feature, product, or release. Use when the user asks for a launch strategy, rollout plan, release strategy, or GTM brief."

[codex.interface]
display_name = "Launch Plan"
short_description = "Draft a structured GTM brief"
default_prompt = "Use $launch-plan to draft a launch strategy for this feature."
