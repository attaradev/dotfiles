name = "changelog"
title = "Changelog"

[claude]
description = "This skill should be used when the user asks to \"update the changelog\", \"write the changelog\", \"generate changelog\", \"what changed since last release\", \"draft release notes\", or \"add changelog entry\". Generates a structured CHANGELOG entry from commits since the last tag, following Keep a Changelog format."
argument_hint = "[version number or release name — optional]"
argument_label = "Version"

[codex]
description = "Generate or update a changelog entry from recent commits. Use when the user asks for release notes, a changelog update, or a summary of changes since the last tag."

[codex.interface]
display_name = "Changelog"
short_description = "Draft release notes"
default_prompt = "Use $changelog to draft the next release entry."
