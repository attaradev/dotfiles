name = "threat-model"
title = "Threat Model"

[claude]
description = "This skill should be used when the user asks to \"threat model this\", \"STRIDE analysis\", \"what can go wrong security-wise\", \"attack surface analysis\", \"security threat model\", \"what are the security risks here\", or \"threat modelling for this feature\". Produces a STRIDE threat model with assets, trust boundaries, threats, mitigations, and residual risk."
argument_hint = "[system, feature, or data flow to threat model]"
argument_label = "System / feature"

[codex]
description = "Produce a STRIDE threat model with assets, trust boundaries, threats, mitigations, and residual risk when the user asks about security risks or attack surfaces."

[codex.interface]
display_name = "Threat Model"
short_description = "Assess attack surface and mitigations"
default_prompt = "Use $threat-model to threat model this feature."
