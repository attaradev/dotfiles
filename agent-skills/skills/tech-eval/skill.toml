name = "tech-eval"
title = "Technology Evaluation"

[claude]
description = "This skill should be used when the user asks to \"evaluate these options\", \"build vs buy\", \"vendor selection\", \"compare these technologies\", \"technology evaluation\", \"which database should we use\", \"make vs buy decision\", or \"tech stack decision\". Produces a structured technology evaluation with criteria matrix, trade-off analysis, and a recommendation with rationale."
argument_hint = "[the decision to evaluate: options, context, and key constraints]"
argument_label = "Decision"

[codex]
description = "Evaluate technology choices with criteria, scoring, trade-offs, and a recommendation when the user asks what stack, database, or vendor to choose."

[codex.interface]
display_name = "Technology Evaluation"
short_description = "Compare technical options"
default_prompt = "Use $tech-eval to evaluate the options for this decision."
