name = "user-story"
title = "User Story Generation"

[claude]
description = "This skill should be used when the user asks to \"write user stories\", \"acceptance criteria for this\", \"BDD scenarios\", \"Given When Then for this\", \"create stories for this feature\", \"story map this\", or \"break this into user stories\". Generates user stories with acceptance criteria in Given/When/Then format, covering the happy path, error states, and edge cases."
argument_hint = "[feature, epic, or workflow to break into user stories]"
argument_label = "Feature / epic"

[codex]
description = "Generate user stories and acceptance criteria. Use when the user asks for user stories, acceptance criteria, BDD scenarios, or story maps."

[codex.interface]
display_name = "User Story"
short_description = "Turn features into testable stories"
default_prompt = "Use $user-story to break this feature into user stories."
