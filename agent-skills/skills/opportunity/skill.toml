name = "opportunity"
title = "Opportunity Assessment"

[claude]
description = "This skill should be used when the user asks to \"assess this opportunity\", \"evaluate this problem space\", \"is this worth building\", \"size this market\", \"opportunity assessment\", or \"should we invest in this\". Produces a structured opportunity assessment covering problem size, target users, current alternatives, and investment rationale."
argument_hint = "[feature idea, problem area, or market opportunity to assess]"
argument_label = "Topic"

[codex]
description = "Assess whether a feature, market, or problem space is worth pursuing. Use when the user asks to evaluate an opportunity, size a market, or decide whether to invest."

[codex.interface]
display_name = "Opportunity Assessment"
short_description = "Evaluate whether to invest"
default_prompt = "Use $opportunity to assess whether this idea is worth pursuing."
