name = "retro"
title = "Retrospective"

[claude]
description = "This skill should be used when the user asks to \"run a retro\", \"retrospective for this sprint\", \"4Ls for this\", \"starfish retro\", \"team retrospective\", \"facilitate a retro\", \"what went well what went wrong\", or \"sprint review\". Produces a retrospective facilitation guide with format selection, structured prompts, and action item capture."
argument_hint = "[sprint, project, quarter, or incident to retrospect on; optionally specify format: 4Ls | starfish | start-stop-continue | sailboat]"
argument_label = "Context"

[codex]
description = "Facilitate a retrospective for a sprint, project, quarter, or incident, choosing an appropriate format and producing prompts, agenda, and action items."

[codex.interface]
display_name = "Retrospective"
short_description = "Facilitate structured retros"
default_prompt = "Use $retro to prepare a retrospective for this sprint."
