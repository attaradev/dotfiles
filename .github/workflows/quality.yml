name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install lint tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh
          npm install --global markdownlint-cli@0.47.0

      - name: Run quality gate
        run: make check

  smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - macos-26

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install smoke prerequisites
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            brew install jq
          fi

      - name: Run smoke checks
        run: make smoke
